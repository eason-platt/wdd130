<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            background-color: #e8eced;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card {
            text-align: center;
            background-image: url(images/christus.webp);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            color: white;
            border: 10px solid black;
            border-radius: 40px;
            margin: 5% auto;
            max-width: 1000px;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
        }

        .presidency-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr;
            grid-column: 2/3;
            justify-items: center;
            height: 180px;
        }

        .quorum-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            grid-column: 2/3;
            justify-items: center;
        }

        .portrait {
            border: 10px solid white;
            border-radius: 50%;
            aspect-ratio: 1/1;
            object-fit: cover;
            width: 100%;
            max-width: 100px;
        }

        .portrait:hover {
            border-color: gold
        }

        .presidency {
            max-width: 125px;
            align-self: end;
        }

        .prophet {
            max-width: 135px;
            align-self: start;
        }

        h2 {
            grid-column: 1/4;
        }

    </style>
</head>

<body>
    <div class="card">
        <h1>First Presidency</h1>
        <div class="layout-grid">
            <div class="presidency-grid">
                <img class="presidency portrait" src="images/eyring.webp" alt="Henry B. Eyring">
                <img class="prophet portrait" src="images/oaks.webp" alt="Dallin H. Oaks">
                <img class="presidency portrait" src="images/christofferson.webp" alt="Christofferson">
            </div>
            <h2>Quorum of The Twelve Apostles</h2>
            <div class="quorum-grid">
                <img class="portrait" src="images/uchtdorf.webp" alt="Uchtdorf">
                <img class="portrait" src="images/bednar.webp" alt="Uchtdorf">
                <img class="portrait" src="images/cook.webp" alt="Uchtdorf">
                <img class="portrait" src="images/anderson.webp" alt="Uchtdorf">
                <img class="portrait" src="images/rasband.webp" alt="Uchtdorf">
                <img class="portrait" src="images/stevenson.webp" alt="Uchtdorf">
                <img class="portrait" src="images/renlund.webp" alt="Uchtdorf">
                <img class="portrait" src="images/gong.webp" alt="Uchtdorf">
                <img class="portrait" src="images/soares.webp" alt="Uchtdorf">
                <img class="portrait" src="images/kearon.webp" alt="Uchtdorf">
                <img class="portrait" src="images/causse.webp" alt="Uchtdorf">
                <img class="portrait" src="images/gilbert.webp" alt="Uchtdorf">
            </div>
        </div>
    </div>
</body>

</html>
